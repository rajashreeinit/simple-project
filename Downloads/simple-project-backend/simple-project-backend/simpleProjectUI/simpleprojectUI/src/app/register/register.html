<div style="max-width: 400px; margin: 2rem auto; padding: 2rem; background-color: var(--bg-secondary); border-radius: 0.5rem; border: 1px solid var(--border-color);">
  <h2 style="text-align: center; margin-bottom: 2rem;">Register</h2>
  
  <form style="display: flex; flex-direction: column; gap: 1rem;">
    <div>
      <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username:</label>
      <input 
        [(ngModel)]="user.username" 
        placeholder="Choose a username" 
        name="username" 
        required
        style="width: 100%; padding: 0.75rem; font-size: 1rem;">
    </div>
    
    <div>
      <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password:</label>
      <input 
        [(ngModel)]="user.password" 
        type="password" 
        placeholder="Create a password" 
        name="password" 
        required
        style="width: 100%; padding: 0.75rem; font-size: 1rem;">
    </div>
    
    <div>
      <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Role:</label>
      <select 
        [(ngModel)]="user.role" 
        name="role" 
        required
        style="width: 100%; padding: 0.75rem; font-size: 1rem;">
        <option value="">Select Role</option>
        <option value="User">User</option>
        <option value="Admin">Admin</option>
      </select>
    </div>
    
    <button 
      type="button" 
      (click)="register()"
      style="width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 1rem;">
      Register
    </button>
    
    <p style="text-align: center; margin-top: 1rem;">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </form>
</div>

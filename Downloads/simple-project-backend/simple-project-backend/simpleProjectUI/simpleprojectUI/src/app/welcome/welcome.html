<div style="max-width: 600px; margin: 2rem auto; padding: 2rem; background-color: var(--bg-secondary); border-radius: 0.5rem; border: 1px solid var(--border-color); text-align: center;">
  <h1 style="margin-bottom: 1rem; color: var(--text-primary);">Welcome, {{username}}!</h1>
  <p style="margin-bottom: 2rem; color: var(--text-secondary); font-size: 1.1rem;">
    You have successfully logged into the application.
  </p>
  <button 
    (click)="logout()"
    style="padding: 0.75rem 2rem; font-size: 1rem;">
    Logout
  </button>
</div>
